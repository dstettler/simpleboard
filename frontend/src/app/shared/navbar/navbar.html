<nav class="navbar">
  <div class="nav-shell">

    <a class="nav-brand" routerLink="/">
      <span class="brand-mark">♞</span>
      <span class="brand-text">SimpleBoard</span>
    </a>

    <div class="nav-center">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/login" routerLinkActive="active">Login</a>
    </div>

    <div class="nav-right">
      <button class="nav-play-btn" type="button" (click)="openGameModal()">
        Play
      </button>
    </div>

  </div>
@if (showGameModal) {
  <div class="modal-backdrop">
    <div class="game-modal">

      <button class="modal-close" type="button" (click)="closeGameModal()">
        ×
      </button>

      <div class="modal-header">
        <p class="modal-eyebrow">Start playing</p>
        <h2>Choose how you want to enter a game</h2>
      </div>

      <div class="modal-grid">

        <!-- Create Game -->
        <div class="modal-section">
          <div class="modal-icon">♞</div>

          <h3>Create Game</h3>

          <p>
            Start a new game and share the link with another player.
          </p>

          <button
            class="modal-primary-btn"
            type="button"
            (click)="createShareGame()"
            [disabled]="isCreating"
          >
            @if (!isCreating) {
              <span>Create Share Link</span>
            } @else {
              <span>Creating...</span>
            }
          </button>
        </div>

        <!-- Join Game -->
        <div class="modal-section modal-section-border">
          <div class="modal-icon">♜</div>

          <h3>Join Game</h3>

          <p>
            Enter a game ID or paste a game link to join an existing game.
          </p>

          <input
            type="text"
            [(ngModel)]="joinGameId"
            placeholder="Enter game ID or paste link"
          />

          <button
            class="modal-secondary-btn"
            type="button"
            (click)="joinGame()"
          >
            Join Game
          </button>
        </div>

      </div>
    </div>
  </div>
}
